global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'xplora-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.containers.internal:8080', 'host.docker.internal:8080', 'localhost:8080']
        labels:
          application: 'xplora-backend'
